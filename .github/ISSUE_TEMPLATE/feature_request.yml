name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Before opening this request:**
        - Check the roadmap in the README — your idea may already be planned.
        - Check open issues to avoid duplicates.
        - Keep requests scoped and specific. "Improve fertilizer" will be closed. "Show the current nitrogen level as a number in the HUD instead of a color bar" is actionable.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or frustration this would address. Focus on the problem, not the solution.
      placeholder: "When I have many fields, I can't tell at a glance which ones need fertilizing without opening the report for each one."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe what you want to happen. Be specific about the behavior, not just the concept.
      placeholder: "Add a HUD overlay that color-codes fields on the map based on fertility level, similar to the FS25 soil map."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you thought of other ways to solve this? Why are they not good enough?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which part of the mod does this relate to?
      options:
        - Soil Fertility Simulation
        - Fertilizer & Organic Matter
        - Plowing & Tillage
        - Soil Report / HUD
        - Settings / Difficulty
        - Multiplayer
        - Mod Compatibility
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Anything Else?
      description: Screenshots, mockups, references to how other mods handle this, or any extra context.
    validations:
      required: false
